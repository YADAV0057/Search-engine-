# SAVE AS: .github/workflows/harvest-tropes.yml  (repo root — alongside
# deploy.yml and harvest-lexicons.yml)
#
# Calls the deployed harvest-tropes Edge Function via curl. Two ways to
# trigger it:
#   1. Manually — GitHub repo -> Actions tab -> "Harvest Tropes" ->
#      "Run workflow" -> optionally set mode/limit -> Run workflow.
#      Leave both blank to run mode "all" with the function's default
#      limit (25).
#   2. Automatically — runs every 6 hours (UTC) via the `schedule` trigger
#      below, same cadence as harvest-lexicons.yml. Scheduled runs ALWAYS
#      use mode "all" (bootstrap + reclassify_thin together) — see the
#      MODE_INPUT/LIMIT_INPUT guards below, same pattern
#      harvest-lexicons.yml uses for entity_types.
#
# One-time setup before this will work (same secrets harvest-lexicons.yml
# already uses — no new ones needed):
#   1. Repo secret SUPABASE_PROJECT_ID   — your project ref
#      (Supabase Dashboard > Project Settings > General > Project ID)
#   2. Repo secret HARVEST_SECRET        — same value set as the
#      harvest-tropes function secret in the Supabase Dashboard
#      (Edge Functions > harvest-tropes > Secrets) -- this is the SAME
#      secret harvest-lexicons.yml already uses; harvest-tropes/index.ts
#      reads the same HARVEST_SECRET env var, so no second secret to add.
#   (Settings > Secrets and variables > Actions, in this GitHub repo)
#
# WHY mode "all" ON SCHEDULE, AND WHY THIS IS SAFE TO JUST LEAVE RUNNING:
# "bootstrap" is near-instant on every run after the first, since it only
# writes a row when a starter-list term is missing entirely -- by now (see
# Notion "Backend Update List" Entry 74) all 61 starter tropes already
# exist, so every scheduled run just does 61 existence checks and moves
# on. "reclassify_thin" is the part doing real work: it re-classifies up
# to `limit` (default 25) of the ~275 thin legacy rows per run and
# upgrades them only if the new result is a genuine improvement (see
# harvest-tropes/index.ts's runReclassifyThin() for the exact
# improvement check) -- never makes a row worse, and stops touching a
# term once it's no longer "thin." At 25/run on a 6-hour cadence, the
# backlog clears in ~11 runs (~3 days) without needing anyone to
# babysit it. Safe to also trigger manually (workflow_dispatch) as many
# times as you want in a row to clear it faster -- each run only ever
# improves rows, never regresses one, so there's no risk from running it
# back-to-back.
#
# Rate limits: same three LLM providers (Groq/Cerebras/Gemini) and same
# PROVIDER_TIMEOUT_MS=3000/LLM_CALL_GAP_MS=500ms pacing already used by
# tropeSignature.js's live query-time fallback -- at 25 rows/run with a
# 500ms gap between calls, a single run's LLM-call time is well under the
# Edge Function's own execution limit, so no per-run timeout risk like
# harvest-lexicons' first-ever cold backfill hit.

name: Harvest Tropes

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'bootstrap | reclassify_thin | all (blank = all)'
        required: false
        default: ''
      limit:
        description: 'Rows to reclassify this run (blank = function default, 25)'
        required: false
        default: ''
  schedule:
    - cron: '0 3,9,15,21 * * *'   # every 6 hours, UTC — offset 3 hours from harvest-lexicons' '0 */6 * * *' so the two never compete for the same Edge Function cold-start window

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - name: Call harvest-tropes
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_ID }}
          HARVEST_SECRET: ${{ secrets.HARVEST_SECRET }}
          # Same guard pattern as harvest-lexicons.yml's ENTITY_TYPES_INPUT:
          # `inputs` is only populated on workflow_dispatch, so this
          # evaluates to '' on a schedule-triggered run -- exactly what we
          # want, since blank mode means "all" per the function's own
          # default.
          MODE_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || '' }}
          LIMIT_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.limit || '' }}
        run: |
          # Build the JSON body: {"mode":"all"} by default, or whatever
          # was entered in the workflow_dispatch form.
          MODE="${MODE_INPUT:-all}"

          if [ -z "$LIMIT_INPUT" ]; then
            BODY=$(jq -n --arg mode "$MODE" '{mode: $mode}')
          else
            BODY=$(jq -n --arg mode "$MODE" --argjson limit "$LIMIT_INPUT" '{mode: $mode, limit: $limit}')
          fi

          echo "Request body: $BODY"

          HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST "https://${SUPABASE_PROJECT_REF}.functions.supabase.co/harvest-tropes" \
            -H "x-harvest-secret: ${HARVEST_SECRET}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          echo "---- Response ($HTTP_CODE) ----"
          cat response.json
          echo ""

          # Print the remaining-thin-rows count front and center so it's
          # visible in the Actions run summary without opening response.json --
          # useful for watching the backlog clear over successive runs.
          REMAINING=$(jq -r '.results.reclassifyThin.remaining // "n/a"' response.json 2>/dev/null || echo "n/a")
          echo "Thin trope_signatures rows remaining after this run: $REMAINING"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::warning::harvest-tropes returned $HTTP_CODE — check response.json above for details."
          fi
